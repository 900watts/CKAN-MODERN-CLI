name: Build & Release CLI

on:
  push:
    branches: [main]
    paths:
      - 'CLI/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout CKAN Core
        uses: actions/checkout@v4
        with:
          repository: 900watts/CKAN-MODERN
          path: Core-repo
          sparse-checkout: |
            Core
            CHANGELOG.md
            GlobalAssemblyInfo.cs

      - name: Link Core dependencies
        shell: pwsh
        run: |
          Copy-Item -Recurse "Core-repo/Core" "Core"
          Copy-Item "Core-repo/CHANGELOG.md" "CHANGELOG.md"
          Copy-Item "Core-repo/GlobalAssemblyInfo.cs" "GlobalAssemblyInfo.cs" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "_build/meta" -Force | Out-Null
          @"
          using System.Reflection;
          [assembly: AssemblyVersion("2.0.0.0")]
          [assembly: AssemblyFileVersion("2.0.0.0")]
          [assembly: AssemblyInformationalVersion("2.0.0-dev")]
          "@ | Set-Content "_build/meta/GlobalAssemblyVersionInfo.cs"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained CLI
        shell: bash
        run: dotnet publish CLI/CKAN-CLI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=none -p:DebugSymbols=false -p:ProduceReferenceAssembly=false '-p:NoWarn=NU1903%3BNU1902%3BNU1901%3BNU1900%3BIL3000%3BSYSLIB0050%3BCS1591' -o ./out-cli

      - name: Verify output
        shell: pwsh
        run: |
          $exe = "out-cli/KerbClaw-CLI.exe"
          if (!(Test-Path $exe)) { throw "KerbClaw-CLI.exe not found!" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "KerbClaw-CLI.exe: $([math]::Round($size, 1)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KerbClaw-CLI
          path: out-cli/KerbClaw-CLI.exe

      - name: Create/Update latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "latest"
          $existing = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            gh release delete-asset $tag KerbClaw-CLI.exe -y 2>$null
            gh release upload $tag out-cli/KerbClaw-CLI.exe --clobber
          } else {
            gh release create $tag out-cli/KerbClaw-CLI.exe --title "KerbClaw CLI (Latest)" --notes "Self-contained CLI build. Runs on any Windows x64 PC without .NET installed."
          }
